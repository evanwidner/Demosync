name: Build and push worker image

on:
  push:
    branches: [main]
    paths:
      - 'worker/**'
      - '.github/workflows/build-worker.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            evanrwidner/demosync-worker:latest
            evanrwidner/demosync-worker:${{ github.sha }}
          cache-from: type=registry,ref=evanrwidner/demosync-worker:buildcache
          cache-to: type=registry,ref=evanrwidner/demosync-worker:buildcache,mode=max
