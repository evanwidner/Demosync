name: Build and push worker image

on:
  push:
    branches: [main]
    paths:
      - 'worker/**'
      - '.github/workflows/build-worker.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            ghcr.io/evanwidner/demosync-worker:latest
            ghcr.io/evanwidner/demosync-worker:${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/evanwidner/demosync-worker:buildcache
          cache-to: type=registry,ref=ghcr.io/evanwidner/demosync-worker:buildcache,mode=max
